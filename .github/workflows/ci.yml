name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "**"

permissions:
  contents: read

env:
  ZIG_VERSION: 0.15.2
  RUST_VERSION: 1.91.0

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target_arg: ""
          - name: Windows
            os: windows-latest
            target_arg: -Dtarget=x86_64-windows-gnu
#          - name: macOS
#            os: macos-latest
#            target_arg: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Windows GNU Rust target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install cargo-zigbuild
        if: runner.os == 'Windows'
        run: cargo install --locked cargo-zigbuild

      - name: Install Vulkan loader (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Install Vulkan loader (macOS)
        if: runner.os == 'macOS'
        run: brew install vulkan-loader

      - name: Run tests
        run: zig build test ${{ matrix.target_arg }} --release=fast --summary failures

      - name: Build application
        run: zig build ${{ matrix.target_arg }} --release=fast --summary failures

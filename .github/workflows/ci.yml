name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "**"

permissions:
  contents: read

env:
  ZIG_VERSION: 0.15.2

jobs:
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Vulkan loader (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Install Vulkan loader (macOS)
        if: runner.os == 'macOS'
        run: brew install vulkan-loader

      - name: Run tests
        run: zig build test

name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

env:
  ZIG_VERSION: 0.15.2
  RUST_VERSION: 1.91.0

jobs:
  resolve-tag:
    name: Resolve tag
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Detect completed tag build
        id: tag
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          tag="$(git tag --points-at "$HEAD_SHA" | grep -Fx "$HEAD_BRANCH" | head -n 1 || true)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux
            target_arg: ""
          - name: Windows
            os: windows-latest
            platform: windows
            target_arg: -Dtarget=x86_64-windows-gnu
#          - name: macOS
#            os: macos-latest
#            platform: macos
#            target_arg: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Windows GNU Rust target
        if: runner.os == 'Windows'
        run: rustup target add x86_64-pc-windows-gnu

      - name: Install cargo-zigbuild
        if: runner.os == 'Windows'
        run: cargo install --locked cargo-zigbuild

      - name: Install Vulkan loader (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Install Vulkan loader (macOS)
        if: runner.os == 'macOS'
        run: brew install vulkan-loader

      - name: Build release binary
        run: zig build ${{ matrix.target_arg }} --release=fast

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARTIFACT_NAME: neskwik-${{ matrix.platform }}-${{ runner.arch }}
        run: |
          $dist = "dist/$env:ARTIFACT_NAME"
          New-Item -ItemType Directory -Force $dist
          Copy-Item zig-out/bin/neskwik.exe $dist/
          Compress-Archive -Path "$dist/*" -DestinationPath "$dist.zip"

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: neskwik-${{ matrix.platform }}-${{ runner.arch }}
        run: |
          dist="dist/$ARTIFACT_NAME"
          mkdir -p "$dist"
          cp zig-out/bin/neskwik "$dist/"
          tar -czf "$dist.tar.gz" -C dist "$ARTIFACT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neskwik-${{ matrix.platform }}-${{ runner.arch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: ignore

  build-android:
    name: Build Android APK
    needs: resolve-tag
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build dependencies
        run: sdkmanager "build-tools;36.1.0" "ndk;28.2.13676358" "platform-tools" "platforms;android-35"

      - name: Build Android APK
        run: zig build -Dandroid=true --release=fast

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: neskwik-android
          path: zig-out/bin/neskwik.apk

  release:
    name: Create GitHub release
    needs:
      - resolve-tag
      - build
      - build-android
    if: needs.resolve-tag.outputs.tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --generate-notes
          fi
